  <style>
    body {
      font-family: 'Gaegu', 'Nanum Pen Script', cursive, sans-serif;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      background-color: #f0fdf4;

    /* 부드러운 둥실둥실 애니메이션 효과 */
    .pulse-soft {
      animation: softPulse 2s infinite ease-in-out;
    }
    @keyframes softPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    /* 화면 진동 피드백 (벌이나 레몬에 부딪혔을 때) */
    @keyframes shake {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      20%, 60% { transform: translate(-4px, 2px) rotate(-1deg); }
      40%, 80% { transform: translate(4px, -2px) rotate(1deg); }
    }
    .shake-active {
      animation: shake 0.3s ease-in-out;
    }
    /* 부드러운 페이드 오버레이 */
    #transition-overlay {
      transition: opacity 1.5s ease-in-out;
      pointer-events: none;
    }

    }

const PLAYER_IMG_SRC = 'KakaoTalk_20260715_162159091.jpg'; // 스테이지 1 & 스테이지 2 공통 주인공 연우 사진!
const STAGE1_BG_SRC = 'KakaoTalk_20260627_130001615.jpg';    // 연우가 직접 그린 이쁘고 반짝이는 바닷가 그림

// 이미지 로딩 관리 객체

// --- 1. Sound Effects (Web Audio API) ---
class SoundEffects {
  constructor() {
    this.ctx = null;
  }

  init() {
    if (!this.ctx) {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  playJump() {
    this.init();
    if (!this.ctx) return;
    let osc = this.ctx.createOscillator();
    let gain = this.ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(150, this.ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(600, this.ctx.currentTime + 0.15);
    
    gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
    
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime + 0.15);
  }

  playHurt() {
    this.init();
    if (!this.ctx) return;
    let osc = this.ctx.createOscillator();
    let gain = this.ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(320, this.ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(120, this.ctx.currentTime + 0.25);
    
    gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.25);
    
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime + 0.25);
  }

  playItem() {
    this.init();
    if (!this.ctx) return;
    let osc = this.ctx.createOscillator();
    let gain = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(523.25, this.ctx.currentTime); // C5
    osc.frequency.setValueAtTime(659.25, this.ctx.currentTime + 0.08); // E5
    osc.frequency.setValueAtTime(783.99, this.ctx.currentTime + 0.16); // G5
    
    gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.28);
    
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime + 0.28);
  }

  playLevelUp() {
    this.init();
    if (!this.ctx) return;
    let osc = this.ctx.createOscillator();
    let gain = this.ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(523.25, this.ctx.currentTime); // C5
    osc.frequency.setValueAtTime(659.25, this.ctx.currentTime + 0.1); // E5
    osc.frequency.setValueAtTime(783.99, this.ctx.currentTime + 0.2); // G5
    osc.frequency.setValueAtTime(1046.50, this.ctx.currentTime + 0.3); // C6
    
    gain.gain.setValueAtTime(0.25, this.ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
    
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime + 0.5);
  }

  playWin() {
    this.init();
    if (!this.ctx) return;
    let notes = [523.25, 587.33, 659.25, 698.46, 783.99, 880.00, 987.77, 1046.50];
    notes.forEach((freq, idx) => {
      let osc = this.ctx.createOscillator();
      let gain = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, this.ctx.currentTime + idx * 0.08);
      
      gain.gain.setValueAtTime(0.15, this.ctx.currentTime + idx * 0.08);
      gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + idx * 0.08 + 0.12);
      
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      osc.start(this.ctx.currentTime + idx * 0.08);
      osc.stop(this.ctx.currentTime + idx * 0.08 + 0.12);
    });
  }
}

const sfx = new SoundEffects();

// 연우 얼굴을 사진으로부터 원형으로 예쁘게 오려 그리는 공용 함수
// KakaoTalk_20260715_162159091.jpg (산타 고깔모자 사진)에 특화되도록 세밀하게 피팅된 크롭
function drawYeonwooFace(ctx, img, x, y, r) {
  if (img.complete && img.naturalWidth > 0) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.closePath();
    ctx.clip();
    
    // 산타 고깔모자 연우 사진의 이목구비를 완벽히 화면 중앙에 위치시키기 위한 세밀 조정
    // 가로 폭 대비 52% 크기의 정사각형 크롭
    const sWidth = img.naturalWidth * 0.52;
    const sHeight = sWidth; 
    const sx = (img.naturalWidth - sWidth) / 2; // 완벽한 좌우 대칭
    // 세로 기준 약 35% 지점에 눈,코,입과 볼살이 예쁘게 조준됨
    const sy = img.naturalHeight * 0.35; 
    
    ctx.drawImage(img, sx, sy, sWidth, sHeight, x - r, y - r, r * 2, r * 2);
    ctx.restore();
  } else {
    // 대체용 캐릭터 아기자기한 드로잉
    ctx.fillStyle = '#ffedd5';
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fca5a5';
    ctx.lineWidth = 4;
    ctx.stroke();
    
    ctx.font = `${r * 1.1}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('👧', x, y + r * 0.05);
  }
}

// 이펙트용 파티클 클래스
class Particle {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.vx = (Math.random() - 0.5) * 8;
    this.vy = (Math.random() - 0.5) * 8 - 4;
    this.radius = Math.random() * 6 + 4;
    this.color = color;
    this.alpha = 1;
    this.decay = Math.random() * 0.05 + 0.02;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.2; // 중력 적용
    this.alpha -= this.decay;
  }

  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.fill();
    ctx.restore();
  }
}

let particles = [];

function spawnParticles(x, y, color, count = 10) {
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y, color));
  }
}

// --- 3. STAGE 1 : 바다 자전거 라이딩 ---
class Stage1Runner {
  constructor() {
    this.reset();
  }

  reset() {
    this.playerY = canvas.height * 0.7;
    this.playerX = 150;
    this.playerWidth = 100;
    this.playerHeight = 100;
    this.vy = 0;
    this.gravity = 0.6;
    this.jumpStrength = -15;
    this.isGrounded = true;
    
    this.groundY = canvas.height * 0.78;
    this.bgOffset = 0;
    this.speed = 5.5;
    
    this.gameDuration = 60; // 60초 달리기 목적지 도달
    this.elapsedTime = 0;
    
    this.obstacles = [];
    this.items = [];
    
    this.spawnTimer = 0;
    this.itemTimer = 0;
    this.invincibilityTimer = 0;
    this.isHurtFlash = false;
  }

  jump() {
    if (this.isGrounded) {
      this.vy = this.jumpStrength;
      this.isGrounded = false;
      sfx.playJump();
      spawnParticles(this.playerX + 30, this.playerY + 70, '#f472b6', 6);
    }
  }

  update(dt) {
    this.elapsedTime += dt;
    const progress = Math.min((this.elapsedTime / this.gameDuration) * 100, 100);
    
    // UI 업데이트
    document.getElementById('progress-bar').style.width = progress + '%';
    document.getElementById('progress-bike').style.left = progress + '%';
    
    if (progress >= 100) {
      triggerStageTransition();
      return;
    }

    // 무적 피격 판정 깜빡임
    if (this.invincibilityTimer > 0) {
      this.invincibilityTimer -= dt;
      this.isHurtFlash = Math.floor(Date.now() / 100) % 2 === 0;
    } else {
      this.isHurtFlash = false;
    }

    // 플레이어 점프 및 중력
    this.playerY += this.vy;
    this.vy += this.gravity;
    
    const realGround = canvas.height * 0.78 - this.playerHeight;
    if (this.playerY >= realGround) {
      this.playerY = realGround;
      this.vy = 0;
      this.isGrounded = true;
    }

    // 바닥/배경 스크롤링
    this.bgOffset -= this.speed;
    if (this.bgOffset <= -canvas.width) {
      this.bgOffset = 0;
    }

    // 장애물 및 아이템 주기적 생성
    this.spawnTimer += dt;
    if (this.spawnTimer > 1.7) {
      this.spawnObstacle();
      this.spawnTimer = 0;
    }

    this.itemTimer += dt;
    if (this.itemTimer > 1.1) {
      this.spawnItem();
      this.itemTimer = 0;
    }

    // 장애물 충돌 검사
    for (let i = this.obstacles.length - 1; i >= 0; i--) {
      const obs = this.obstacles[i];
      obs.x -= this.speed;

      if (obs.type === 'gull') {
        obs.y = obs.baseY + Math.sin(Date.now() * 0.006) * 15;
      }

      // 판정 버퍼
      if (
        this.invincibilityTimer <= 0 &&
        this.playerX < obs.x + obs.width - 15 &&
        this.playerX + this.playerWidth - 15 > obs.x &&
        this.playerY < obs.y + obs.height - 15 &&
        this.playerY + this.playerHeight - 15 > obs.y
      ) {
        sfx.playHurt();
        hearts--;
        this.invincibilityTimer = 1.5;
        spawnParticles(obs.x + obs.width/2, obs.y + obs.height/2, '#ef4444', 12);
        this.obstacles.splice(i, 1);
        updateHeartsUI();
        
        // 피격 시 느려짐 연출
        const originalSpeed = this.speed;
        this.speed = 2;
        setTimeout(() => this.speed = originalSpeed, 800);
        continue;
      }

      if (obs.x + obs.width < 0) {
        this.obstacles.splice(i, 1);
      }
    }

    // 아이템 획득 검사
    for (let i = this.items.length - 1; i >= 0; i--) {
      const item = this.items[i];
      item.x -= this.speed;

      if (
        this.playerX < item.x + item.width &&
        this.playerX + this.playerWidth > item.x &&
        this.playerY < item.y + item.height &&
        this.playerY + this.playerHeight > item.y
      ) {
        sfx.playItem();
        score += item.points;
        document.getElementById('score-text').innerText = score;
        spawnParticles(item.x + item.width/2, item.y + item.height/2, item.type === 'ice' ? '#fef08a' : '#bfdbfe', 10);
        this.items.splice(i, 1);
        continue;
      }

      if (item.x + item.width < 0) {
        this.items.splice(i, 1);
      }
    }

    // 하트가 다 닳으면 무한 격려 후 리필
    if (hearts <= 0) {
      hearts = 3;
      updateHeartsUI();
      showHurtOverlay();
    }
  }

  spawnObstacle() {
    const types = ['puddle', 'rock', 'gull'];
    const selectedType = types[Math.floor(Math.random() * types.length)];
    const obs = {
      type: selectedType,
      x: canvas.width,
      width: 50,
      height: 50
    };

    if (selectedType === 'gull') {
      obs.baseY = canvas.height * 0.4 + Math.random() * 80;
      obs.y = obs.baseY;
      obs.width = 50;
      obs.height = 40;
    } else if (selectedType === 'puddle') {
      obs.y = canvas.height * 0.78 - 18;
      obs.width = 60;
      obs.height = 18;
    } else { // rock
      obs.y = canvas.height * 0.78 - 42;
      obs.width = 45;
      obs.height = 42;
    }

    this.obstacles.push(obs);
  }

  spawnItem() {
    const types = [
      { type: 'shell', points: 15, emoji: '🐚', color: '#fed7aa' },
      { type: 'ice', points: 25, emoji: '🍦', color: '#fef08a' }
    ];
    const selected = types[Math.floor(Math.random() * types.length)];
    
    this.items.push({
      type: selected.type,
      emoji: selected.emoji,
      color: selected.color,
      points: selected.points,
      x: canvas.width,
      y: canvas.height * 0.35 + Math.random() * 180,
      width: 40,
      height: 40
    });
  }

  draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 연우 그림 배경 그리기
    if (images.stage1Bg.complete && images.stage1Bg.naturalWidth > 0) {
      ctx.drawImage(images.stage1Bg, this.bgOffset, 0, canvas.width, canvas.height);
      ctx.drawImage(images.stage1Bg, this.bgOffset + canvas.width, 0, canvas.width, canvas.height);
    } else {
      // 대체 파스텔 그라데이션
      let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, '#bae6fd');
      gradient.addColorStop(0.5, '#7dd3fc');
      gradient.addColorStop(0.78, '#38bdf8');
      gradient.addColorStop(0.79, '#fef08a');
      gradient.addColorStop(1, '#fde047');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // 방파제 바닥선
    ctx.fillStyle = '#cbd5e1';
    ctx.fillRect(0, canvas.height * 0.78, canvas.width, canvas.height * 0.22);
    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height * 0.78);
    ctx.lineTo(canvas.width, canvas.height * 0.78);
    ctx.stroke();

    // 아이템 드로잉
    this.items.forEach(item => {
      ctx.font = '36px sans-serif';
      ctx.fillText(item.emoji, item.x, item.y + 30);
    });

    // 장애물 드로잉
    this.obstacles.forEach(obs => {
      if (obs.type === 'gull') {
        ctx.font = '40px sans-serif';
        const wing = Math.floor(Date.now() / 200) % 2 === 0 ? '🦅' : '🕊️';
        ctx.fillText(wing, obs.x, obs.y + 35);
      } else if (obs.type === 'puddle') {
        ctx.fillStyle = 'rgba(56, 189, 248, 0.7)';
        ctx.beginPath();
        ctx.ellipse(obs.x + obs.width/2, obs.y + obs.height/2, obs.width/2, obs.height/2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#0284c7';
        ctx.stroke();
      } else {
        ctx.font = '36px sans-serif';
        ctx.fillText('🪨', obs.x, obs.y + 38);
      }
    });

    // 플레이어 캐릭터 (연우 예쁜 고깔모자 사진 1번 스테이지 연동)
    if (!this.isHurtFlash) {
      ctx.save();
      
      const faceX = this.playerX + 50;
      const faceY = this.playerY + 30;
      const faceR = 28;

      // 자전거 그리기
      ctx.font = '72px sans-serif';
      ctx.fillText('🚲', this.playerX, this.playerY + 95);

      // 자전거 안장 위치에 동그란 연우 얼굴 합성하기! (Y좌표 최적화된 Crop 적용)
      drawYeonwooFace(ctx, images.player, faceX, faceY, faceR);

      // 머리에 왕관 보조 데코 👑
      ctx.font = '24px sans-serif';
      ctx.fillText('👑', this.playerX + 38, this.playerY + 8);

      ctx.restore();
    }
  }
}

// --- 4. STAGE 2 : 휴가지 오이팩 캐치 게임 ---
class Stage2Cucumber {
  constructor() {
    this.reset();
  }

  reset() {
    this.playerX = canvas.width / 2;
    this.playerY = canvas.height * 0.73;
    this.playerWidth = 140;
    this.playerHeight = 110;
    this.speed = 10;
    
    this.cucumbersCaught = 0;
    this.items = [];
    this.spawnTimer = 0;
    
    // 연우의 새로운 사진 얼굴 영역 크기에 부합하게 15군데 귀여운 오이 슬라이스 좌표 설정 (얼굴 중앙 중심)
    this.spots = [
      { dx: 0, dy: -32, active: false },   // 이마 정가운데
      { dx: -25, dy: -28, active: false }, // 이마 왼쪽
      { dx: 25, dy: -28, active: false },  // 이마 오른쪽
      
      { dx: -38, dy: 5, active: false },   // 왼쪽 볼 바깥
      { dx: -18, dy: 8, active: false },   // 왼쪽 광대
      { dx: 38, dy: 5, active: false },    // 오른쪽 볼 바깥
      { dx: 18, dy: 8, active: false },    // 오른쪽 광대
      
      { dx: 0, dy: 6, active: false },     // 콧등
      { dx: 0, dy: -12, active: false },   // 미간
      
      { dx: -15, dy: 24, active: false },  // 왼쪽 아래 볼
      { dx: 15, dy: 24, active: false },   // 오른쪽 아래 볼
      { dx: -28, dy: 20, active: false },  // 왼쪽 턱 부근
      { dx: 28, dy: 20, active: false },   // 오른쪽 턱 부근
      
      { dx: 0, dy: 42, active: false },    // 턱 아래
      { dx: 0, dy: 22, active: false }     // 인중
    ];
  }

  moveLeft() {
    this.playerX = Math.max(this.playerWidth / 2, this.playerX - this.speed);
  }

  moveRight() {
    this.playerX = Math.min(canvas.width - this.playerWidth / 2, this.playerX + this.speed);
  }

  update(dt) {
    if (this.cucumbersCaught >= 15) {
      triggerEnding();
      return;
    }

    // 위에서 떨어지는 다양한 아이템 젠
    this.spawnTimer += dt;
    if (this.spawnTimer > 0.75) {
      this.spawnFallingItem();
      this.spawnTimer = 0;
    }

    // 아이템 하강 및 부딪힘 판정
    for (let i = this.items.length - 1; i >= 0; i--) {
      const item = this.items[i];
      item.y += item.speed;

      // 둥그런 피격 상자 판정
      if (
        item.y + item.height >= this.playerY &&
        item.y <= this.playerY + this.playerHeight &&
        item.x + item.width >= this.playerX - this.playerWidth/2 &&
        item.x <= this.playerX + this.playerWidth/2
      ) {
        if (item.type === 'cucumber') {
          sfx.playItem();
          if (this.cucumbersCaught < 15) {
            this.spots[this.cucumbersCaught].active = true;
            this.cucumbersCaught++;
            score += 30;
            document.getElementById('score-text').innerText = score;
            document.getElementById('cucumber-count').innerText = this.cucumbersCaught;
          }
          spawnParticles(item.x + item.width/2, item.y + item.height/2, '#10b981', 12);
        } else {
          // 벌이나 레몬에 닿으면 팩 한 개 날아감!
          sfx.playHurt();
          if (this.cucumbersCaught > 0) {
            this.cucumbersCaught--;
            this.spots[this.cucumbersCaught].active = false;
            document.getElementById('cucumber-count').innerText = this.cucumbersCaught;
          }
          spawnParticles(item.x + item.width/2, item.y + item.height/2, item.type === 'bee' ? '#f59e0b' : '#facc15', 15);
          triggerShakeEffect();
        }
        this.items.splice(i, 1);
        continue;
      }

      if (item.y > canvas.height) {
        this.items.splice(i, 1);
      }
    }
  }

  spawnFallingItem() {
    const rand = Math.random();
    let type = 'cucumber';
    let emoji = '🥒';
    let speed = Math.random() * 3 + 3.5;

    if (rand > 0.78) {
      type = 'lemon';
      emoji = '🍋';
      speed += 1.2;
    } else if (rand > 0.65) {
      type = 'bee';
      emoji = '🐝';
      speed += 1.8;
    }

    this.items.push({
      type,
      emoji,
      x: Math.random() * (canvas.width - 60) + 30,
      y: -50,
      width: 45,
      height: 45,
      speed
    });
  }

  draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 노을 바닷가 그라데이션 배경
    let skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    skyGradient.addColorStop(0, '#ffedd5');   // 포근한 연주황
    skyGradient.addColorStop(0.4, '#fed7aa');
    skyGradient.addColorStop(0.65, '#f43f5e'); // 타오르는 핑크 노을
    skyGradient.addColorStop(0.85, '#9d174d'); // 예쁜 다홍 바다
    ctx.fillStyle = skyGradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 수평선 뭉게구름 데코
    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
    ctx.beginPath();
    ctx.ellipse(180, 140, 90, 25, 0, 0, Math.PI * 2);
    ctx.ellipse(640, 110, 110, 35, 0, 0, Math.PI * 2);
    ctx.fill();

    // 야자수 데코레이션
    ctx.font = '72px sans-serif';
    ctx.fillText('🌴', 30, canvas.height * 0.73);
    ctx.fillText('🌴', canvas.width - 120, canvas.height * 0.73);

    // 누워있는 나무 평상
    ctx.fillStyle = '#b45309';
    ctx.fillRect(0, canvas.height * 0.75, canvas.width, canvas.height * 0.25);
    ctx.fillStyle = '#78350f';
    ctx.fillRect(0, canvas.height * 0.75, canvas.width, 8); 

    // 하강하는 오이/벌/레몬
    this.items.forEach(item => {
      ctx.font = '40px sans-serif';
      ctx.fillText(item.emoji, item.x, item.y + 35);
    });

    // 나무 베개와 함께 예쁘게 누워있는 연우 얼굴 렌더링
    ctx.save();
    ctx.translate(this.playerX, this.playerY + 20);

    // 원형 베개
    ctx.fillStyle = '#a5f3fc';
    ctx.beginPath();
    ctx.roundRect(-75, -55, 150, 80, 20);
    ctx.fill();
    ctx.strokeStyle = '#22d3ee';
    ctx.lineWidth = 4;
    ctx.stroke();

    // 두번째 스테이지에서도 이목구비 비율이 딱 맞게 조율된 연우 얼굴 사진 원형 크롭 적용!
    const faceRadius = 55;
    drawYeonwooFace(ctx, images.player, 0, -10, faceRadius);

    // 원형 테두리 라인
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#f472b6';
    ctx.beginPath();
    ctx.arc(0, -10, faceRadius, 0, Math.PI * 2);
    ctx.stroke();

    // 이불 포개어주기
    ctx.fillStyle = '#fbcfe8';
    ctx.beginPath();
    ctx.roundRect(-85, 30, 170, 70, [15, 15, 0, 0]);
    ctx.fill();
    ctx.strokeStyle = '#f472b6';
    ctx.lineWidth = 4;
    ctx.stroke();

    // 이불 패턴 🧸
    ctx.font = '28px sans-serif';
    ctx.fillText('🧸', -14, 75);

    // 얼굴에 정확하게 얹어질 동그란 오이 슬라이스 묘사
    this.spots.forEach(spot => {
      if (spot.active) {
        ctx.save();
        ctx.translate(spot.dx, spot.dy - 10);
        
        // 오이 테두리 껍질
        ctx.fillStyle = '#065f46';
        ctx.beginPath();
        ctx.arc(0, 0, 12, 0, Math.PI * 2);
        ctx.fill();

        // 오이 안쪽 달콤하고 맑은 속살
        ctx.fillStyle = '#a7f3d0';
        ctx.beginPath();
        ctx.arc(0, 0, 9.5, 0, Math.PI * 2);
        ctx.fill();

        // 오이씨 표현
        ctx.fillStyle = '#047857';
        ctx.font = '7px Arial';
        ctx.fillText('•', -3, -1);
        ctx.fillText('•', 2, -2);
        ctx.fillText('•', -2, 3);
        ctx.fillText('•', 3, 2);
        
        ctx.restore();
      }
    });

    ctx.restore();
  }
}

let s1 = new Stage1Runner();
let s2 = new Stage2Cucumber();

// 하트 개수 시각화
function updateHeartsUI() {
  const container = document.getElementById('hearts-container');
  container.innerHTML = '❤️'.repeat(hearts) + '🤍'.repeat(Math.max(0, 3 - hearts));
}

// 피격 진동 연출
function triggerShakeEffect() {
  const container = document.getElementById('game-container');
  container.classList.add('shake-active');
  setTimeout(() => {
    container.classList.remove('shake-active');
  }, 320);
}

// 관대히 격려해주는 부활 안내
function showHurtOverlay() {
  const bubble = document.getElementById('cheer-bubble');
  document.getElementById('cheer-text').innerText = "괜찮아 연우야! 다시 가자! ⭐";
  document.getElementById('cheer-emoji').innerText = "💖";
  bubble.style.opacity = '1';
  bubble.style.transform = 'translate(-50%, -50%) scale(1.15)';
  setTimeout(() => {
    bubble.style.opacity = '0';
  }, 2000);
}

// 부드러운 스테이지 1 -> 2 화이트아웃 화면 전환
function triggerStageTransition() {
  gameState = 'TRANSITION';
  sfx.playLevelUp();
  
  const overlay = document.getElementById('transition-overlay');
  overlay.style.opacity = '1';

  const bubble = document.getElementById('cheer-bubble');
  document.getElementById('cheer-text').innerText = "휴가지에 도착했어요! 🎉";
  document.getElementById('cheer-emoji').innerText = "🏖️";
  bubble.style.opacity = '1';
  bubble.style.transform = 'translate(-50%, -50%) scale(1.3)';

  setTimeout(() => {
    gameState = 'STAGE2';
    document.getElementById('stage-indicator').innerText = "스테이지 2 - 오이팩 붙이기 🥒";
    document.getElementById('cucumber-counter').classList.remove('hidden');
    
    // 모바일 하단 이동 자판 컨트롤 배치
    document.getElementById('mobile-jump-zone').classList.add('hidden');
    document.getElementById('mobile-move-zone').classList.remove('hidden');

    s2.reset();
    overlay.style.opacity = '0';
    bubble.style.opacity = '0';
  }, 2200);
}

// 최종 엔딩 연출
function triggerEnding() {
  gameState = 'ENDING';
  sfx.playWin();
  
  document.getElementById('game-header').classList.add('hidden');
  document.getElementById('cucumber-counter').classList.add('hidden');
  document.getElementById('mobile-controls').classList.add('hidden');
  
  document.getElementById('final-score').innerText = score;
  document.getElementById('ending-screen').classList.remove('hidden');
}

// 키보드 리스너 연동
const keys = {};
window.addEventListener('keydown', (e) => {
  keys[e.code] = true;
  if (gameState === 'STAGE1' && (e.code === 'Space' || e.code === 'ArrowUp')) {
    s1.jump();
  }
});
window.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

// 스크린 터치 및 스와이프 조작
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameState === 'STAGE1') {
    s1.jump();
  }
}, { passive: false });

document.getElementById('touch-jump-btn').addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameState === 'STAGE1') {
    s1.jump();
  }
});

// 드래그 제스쳐 핸들링
let isDragging = false;
function handlePointerMove(clientX) {
  if (gameState === 'STAGE2') {
    const rect = canvas.getBoundingClientRect();
    const relativeX = clientX - rect.left;
    const canvasScale = canvas.width / rect.width;
    s2.playerX = Math.max(s2.playerWidth/2, Math.min(canvas.width - s2.playerWidth/2, relativeX * canvasScale));
  }
}

canvas.addEventListener('mousedown', () => isDragging = true);
canvas.addEventListener('mousemove', (e) => {
  if (isDragging) handlePointerMove(e.clientX);
});
window.addEventListener('mouseup', () => isDragging = false);

canvas.addEventListener('touchstart', (e) => {
  isDragging = true;
  if (e.touches[0]) handlePointerMove(e.touches[0].clientX);
});
canvas.addEventListener('touchmove', (e) => {
  if (isDragging && e.touches[0]) {
    handlePointerMove(e.touches[0].clientX);
  }
});
canvas.addEventListener('touchend', () => isDragging = false);

// 터치식 가상 제어판
let moveLeftInterval, moveRightInterval;

document.getElementById('touch-left-btn').addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameState === 'STAGE2') {
    moveLeftInterval = setInterval(() => s2.moveLeft(), 20);
  }
});
document.getElementById('touch-left-btn').addEventListener('touchend', () => {
  clearInterval(moveLeftInterval);
});

document.getElementById('touch-right-btn').addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameState === 'STAGE2') {
    moveRightInterval = setInterval(() => s2.moveRight(), 20);
  }
});
document.getElementById('touch-right-btn').addEventListener('touchend', () => {
  clearInterval(moveRightInterval);
});

// 루프 시스템
function gameLoop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  let dt = (timestamp - lastTime) / 1000;
  if (dt > 0.1) dt = 0.1; 
  lastTime = timestamp;

  // 파티클 후속 갱신
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    if (particles[i].alpha <= 0) {
      particles.splice(i, 1);
    }
  }

  // 게임 라이브 드로우
  if (gameState === 'STAGE1') {
    s1.update(dt);
    s1.draw();
  } else if (gameState === 'STAGE2') {
    if (keys['ArrowLeft'] || keys['KeyA']) s2.moveLeft();
    if (keys['ArrowRight'] || keys['KeyD']) s2.moveRight();
    s2.update(dt);
    s2.draw();
  } else if (gameState === 'TRANSITION') {
    s1.draw();
  }

  particles.forEach(p => p.draw(ctx));

  // 간헐적인 격려 응원 메시지
  if (gameState === 'STAGE1' || gameState === 'STAGE2') {
    if (timestamp - lastCheerTime > 4500 + Math.random() * 3000) {
      showCheer();
      lastCheerTime = timestamp;
    }
  }

  requestAnimationFrame(gameLoop);
}

// 시작버튼 이벤트 연동
document.getElementById('start-btn').addEventListener('click', () => {
  sfx.init();
  sfx.playLevelUp();
  
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('game-header').classList.remove('hidden');
  document.getElementById('mobile-controls').classList.remove('hidden');
  
  gameState = 'STAGE1';
  score = 0;
  hearts = 3;
  document.getElementById('score-text').innerText = score;
  updateHeartsUI();
  s1.reset();
  
  lastTime = performance.now();
  showCheer();
});

// 홈으로 복귀
document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('ending-screen').classList.add('hidden');
  document.getElementById('start-screen').classList.remove('hidden');
  document.getElementById('mobile-jump-zone').classList.remove('hidden');
  document.getElementById('mobile-move-zone').classList.add('hidden');
  gameState = 'START';
});

requestAnimationFrame(gameLoop);
</script>
